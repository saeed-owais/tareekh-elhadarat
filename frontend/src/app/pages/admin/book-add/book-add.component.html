<!-- Main Admin Book Add Area -->
<main class="min-w-0 pt-20 pb-24 min-h-screen relative" 
      [class.lg:mr-64]="ts.isRtl()" [class.lg:ml-64]="!ts.isRtl()"
      [dir]="ts.isRtl() ? 'rtl' : 'ltr'">
  <div class="p-4 sm:p-6 md:p-8 max-w-5xl mx-auto">
    <!-- Header -->
    <div class="flex flex-row-reverse justify-between items-end mb-10">
      <div [class.text-right]="ts.isRtl()" [class.text-left]="!ts.isRtl()">
        <h2 class="text-2xl md:text-3xl font-headline font-bold text-primary mb-2">{{ ts.t('admin.bookAdd.title') }}</h2>
        <p class="text-on-surface/60 text-xs md:text-sm max-w-md leading-relaxed">
          {{ ts.t('admin.bookAdd.subtitle') }}
        </p>
      </div>
      <button (click)="router.navigate(['/admin/books'])" 
        class="bg-surface-container-high text-on-surface px-6 py-3 rounded-lg flex items-center gap-2 hover:bg-surface-variant transition-colors font-bold">
        <span class="material-symbols-outlined">arrow_forward</span>
        {{ ts.t('admin.bookAdd.backToList') }}
      </button>
    </div>

    <!-- Form Section -->
    <form (submit)="onSubmit(); $event.preventDefault()" class="space-y-8 pb-20">
      
      <!-- Grid Layout for Inputs -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 bg-surface-container-low p-8 rounded-2xl border border-outline-variant/20 shadow-sm shadow-black/5">
        
        <!-- Field: Title & Author -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:col-span-2">
          <div class="space-y-2">
            <label class="text-xs font-black text-on-surface/40 uppercase tracking-widest">{{ ts.t('admin.bookAdd.bookTitle') }}</label>
            <input type="text" [(ngModel)]="title" name="title"
              class="w-full px-5 py-4 bg-surface-container-lowest border border-outline-variant/10 rounded-2xl focus:ring-4 focus:ring-primary/5 focus:border-primary/30 outline-none transition-all placeholder:text-on-surface/20 font-bold"
              [placeholder]="ts.t('admin.bookAdd.bookTitle') + '...'">
          </div>
          <div class="space-y-2">
            <label class="text-xs font-black text-on-surface/40 uppercase tracking-widest">{{ ts.t('admin.bookAdd.author') }}</label>
            <input type="text" [(ngModel)]="author" name="author"
              class="w-full px-5 py-4 bg-surface-container-lowest border border-outline-variant/10 rounded-2xl focus:ring-4 focus:ring-primary/5 focus:border-primary/30 outline-none transition-all placeholder:text-on-surface/20 font-bold"
              [placeholder]="ts.t('admin.bookAdd.author') + '...'">
          </div>
        </div>

        <!-- Field: PageCount & ReleaseDate -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:col-span-2">
          <div class="space-y-2">
            <label class="text-xs font-black text-on-surface/40 uppercase tracking-widest">{{ ts.t('admin.bookAdd.pages') }}</label>
            <input type="number" [(ngModel)]="pageCount" name="pageCount"
              class="w-full px-5 py-4 bg-surface-container-lowest border border-outline-variant/10 rounded-2xl focus:ring-4 focus:ring-primary/5 focus:border-primary/30 outline-none transition-all placeholder:text-on-surface/20 font-bold"
              [placeholder]="ts.t('admin.bookAdd.pages') + '...'">
          </div>
          <div class="space-y-2">
            <label class="text-xs font-black text-on-surface/40 uppercase tracking-widest">{{ ts.t('admin.bookAdd.releaseDate') }}</label>
            <input type="date" [(ngModel)]="releaseDate" name="releaseDate"
              class="w-full px-5 py-4 bg-surface-container-lowest border border-outline-variant/10 rounded-2xl focus:ring-4 focus:ring-primary/5 focus:border-primary/30 outline-none transition-all placeholder:text-on-surface/20 font-bold">
          </div>
        </div>

        <!-- Field: About -->
        <div class="space-y-2 md:col-span-2">
          <label class="text-xs font-black text-on-surface/40 uppercase tracking-widest">{{ ts.t('admin.bookAdd.about') }}</label>
          <textarea [(ngModel)]="about" name="about" rows="4"
            class="w-full px-5 py-4 bg-surface-container-lowest border border-outline-variant/10 rounded-2xl focus:ring-4 focus:ring-primary/5 focus:border-primary/30 outline-none transition-all placeholder:text-on-surface/20 font-bold"
            [placeholder]="ts.t('admin.bookAdd.about') + '...'"></textarea>
        </div>
      </div>

      <!-- File Uploads Area -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="space-y-4">
          <label class="text-xs font-black text-on-surface/40 uppercase tracking-widest">{{ ts.t('admin.bookAdd.coverImage') }}</label>
          <div class="relative group">
            @if (!posterPreview()) {
              <label class="flex flex-col items-center justify-center w-full h-64 bg-surface-container-lowest border-2 border-dashed border-outline-variant/20 rounded-3xl cursor-pointer hover:border-primary/30 hover:bg-primary/5 transition-all">
                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                  <span class="material-symbols-outlined text-3xl text-primary mb-2">add_photo_alternate</span>
                  <p class="text-xs font-bold text-on-surface/70">{{ ts.t('admin.bookAdd.chooseCover') }}</p>
                </div>
                <input type="file" class="hidden" (change)="onPosterSelected($event)" accept="image/*">
              </label>
            } @else {
              <div class="relative h-64 rounded-3xl overflow-hidden shadow-lg border border-outline-variant/10 group">
                <img [src]="posterPreview()" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                  <label class="bg-white text-primary p-3 rounded-full cursor-pointer hover:scale-110 transition-transform shadow-xl">
                    <span class="material-symbols-outlined">edit</span>
                    <input type="file" class="hidden" (change)="onPosterSelected($event)" accept="image/*">
                  </label>
                </div>
              </div>
            }
          </div>
        </div>

        <div class="space-y-4">
          <label class="text-xs font-black text-on-surface/40 uppercase tracking-widest">{{ ts.t('admin.bookAdd.bookFile') }}</label>
          <label class="flex flex-col items-center justify-center w-full h-64 bg-surface-container-lowest border-2 border-dashed border-outline-variant/20 rounded-3xl cursor-pointer hover:border-secondary/30 hover:bg-secondary/5 transition-all group overflow-hidden">
            <div class="flex flex-col items-center justify-center pt-5 pb-6 px-4 text-center">
              <div class="w-16 h-16 rounded-full bg-secondary/10 flex items-center justify-center text-secondary mb-4 group-hover:scale-110 transition-transform">
                <span class="material-symbols-outlined text-3xl">{{ bookFile() ? 'check_circle' : 'picture_as_pdf' }}</span>
              </div>
              <p class="text-[10px] font-black text-secondary uppercase tracking-widest mb-1">{{ bookFile() ? 'File Ready' : 'Upload PDF' }}</p>
              <p class="text-xs font-bold text-on-surface/70 line-clamp-1 break-all">{{ bookFile()?.name || ts.t('admin.bookAdd.chooseFile') }}</p>
            </div>
            <input type="file" class="hidden" (change)="onBookFileSelected($event)" accept="application/pdf">
          </label>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex flex-col sm:flex-row gap-4">
        <button type="submit" [disabled]="isLoading()"
          class="flex-[2] bg-primary text-on-primary font-black py-5 rounded-2xl shadow-xl hover:bg-primary/90 transition-all flex items-center justify-center gap-3 active:scale-[0.98] disabled:opacity-50">
          @if (isLoading()) { 
             <div class="w-6 h-6 border-4 border-on-primary/20 border-t-on-primary rounded-full animate-spin"></div> 
             <span>{{ isUploading() ? ts.t('admin.bookAdd.uploadingMsg') : ts.t('admin.bookAdd.uploadSuccessMsg') }}</span>
          } @else {
            <span class="material-symbols-outlined text-xl">cloud_upload</span>
            <span>{{ ts.t('admin.bookAdd.submit') }}</span>
          }
        </button>
        <button type="button" (click)="router.navigate(['/admin/books'])"
          class="flex-1 bg-surface-container-high text-on-surface font-bold py-5 rounded-2xl flex items-center justify-center hover:bg-surface-variant transition-all active:scale-[0.98]">
          {{ ts.t('admin.bookAdd.cancel') }}
        </button>
      </div>

      <!-- Messages -->
      @if (errorMessage()) {
        <div class="p-4 bg-error/10 text-error rounded-xl text-center text-sm font-bold border border-error/10 animate-in slide-in-from-top-4">
          {{ errorMessage() }}
        </div>
      }
      @if (successMessage()) {
        <div class="p-4 bg-primary/10 text-primary rounded-xl text-center text-sm font-bold border border-primary/10 animate-in slide-in-from-top-4">
          {{ successMessage() }}
        </div>
      }

    </form>
  </div>
</main>
