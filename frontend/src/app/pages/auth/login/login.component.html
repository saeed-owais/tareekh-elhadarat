<div class="min-h-screen flex flex-col lg:flex-row bg-surface font-body">

   <!-- Right Side: Image and Text -->
  <div class="hidden lg:flex w-1/2 relative flex-col justify-center items-center bg-primary text-white overflow-hidden">
    <!-- Background Image -->
    <img src="assets/images/auth-bg.png" alt="History Background" class="absolute inset-0 w-full h-full object-cover">

    <!-- Dark Overlay -->
    <div class="absolute inset-0 bg-primary/75"></div>

    <!-- Content -->
    <div class="relative z-10 p-12 text-center text-white flex flex-col items-center">
      <!-- You can add a logo here if needed -->
      <h1 class="text-4xl md:text-5xl font-headline font-bold mb-6 leading-tight">
        تاريخ الشعوب<br>
        <span class="text-secondary-fixed">رحلة عبر الحضارات والثقافات</span>
      </h1>
      <p class="text-xl font-body leading-relaxed max-w-lg mx-auto text-surface-dim">
        نستكشف جذور الإنسان وتنوعه عبر العصور، لنبني جسراً من المعرفة يربط الماضي بالمستقبل.
      </p>
    </div>
  </div>

  <!-- Left Side: Login Form -->
  <div class="w-full lg:w-1/2 flex items-center justify-center p-8 bg-surface text-on-surface">
    <div class="w-full max-w-md">
      <div class="text-center mb-10">
        <h2 class="text-3xl font-headline font-bold text-primary mb-2">مرحباً بعودتك!</h2>
        <!-- <p class="text-outline">سجل دخولك لمتابعة رحلتك في تاريخ الشعوب</p> -->
      </div>

      <form class="space-y-6" (submit)="$event.preventDefault()">
        <!-- Email Field -->
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-primary/80 mr-1" for="email">البريد الإلكتروني</label>
          <div class="relative group">
            <span
              class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors">mail</span>
            <input
              class="w-full pr-12 pl-4 py-3.5 bg-surface-container border-none focus:ring-2 focus:ring-secondary/20 rounded-lg text-primary placeholder-outline transition-all"
              id="email" placeholder="example@history.com" type="email" />
          </div>
        </div>
        <!-- Password Field -->
        <div class="space-y-2">
          <div class="flex justify-between items-center px-1">
            <label class="block text-sm font-semibold text-primary/80" for="password">كلمة المرور</label>

          </div>
          <div class="relative group">
            <span
              class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors">lock</span>
            <input
              class="w-full pr-12 pl-4 py-3.5 bg-surface-container border-none focus:ring-2 focus:ring-secondary/20 rounded-lg text-primary placeholder-outline transition-all"
              id="password" placeholder="••••••••" type="password" />
          </div>
        </div>


        <div class="flex items-center justify-between">
          <label class="flex items-center">
            <input type="checkbox"
              class="w-4 h-4 text-primary bg-surface border-outline-variant rounded focus:ring-primary focus:ring-2">
            <span class="mr-2 text-sm text-on-surface-variant">تذكرني</span>
          </label>
          <a class="text-xs font-semibold text-secondary hover:text-on-secondary-container transition-colors"
            routerLink="/auth/forgot-password">نسيت كلمة المرور؟</a>
        </div>

        <button type="submit"
          class="w-full bg-primary text-white py-3 px-4 rounded-xl hover:bg-inverse-surface transition-colors font-medium text-lg">
          تسجيل الدخول
        </button>

        <p class="text-center text-sm text-on-surface-variant mt-6">
          ليس لديك حساب؟
          <a routerLink="/auth/register" class="text-secondary font-bold hover:underline">سجل الآن</a>
        </p>
      </form>
    </div>
  </div>

 
</div>
