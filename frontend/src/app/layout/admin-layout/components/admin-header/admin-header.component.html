<header
  class="sticky top-0 z-40 bg-[#FBFBE2] dark:bg-[#061B0E] text-[#061B0E] shadow-[0_8px_32px_rgba(6,27,14,0.06)] px-4 md:px-8 py-3 md:py-4 flex justify-between items-center w-full font-['Newsreader'] antialiased"
  dir="rtl">
  
  @if (isMobileSearchOpen()) {
    <div class="absolute inset-0 z-50 bg-[#FBFBE2] dark:bg-[#061B0E] px-4 flex items-center justify-between gap-3 md:hidden animate-in fade-in duration-200">
      <div class="relative w-full flex-1">
        <input
          class="w-full bg-surface-container-low border-none rounded-full px-12 py-2 text-sm focus:ring-2 focus:ring-secondary/30 transition-all text-right"
          placeholder="ابحث في لوحة التحكم..." type="text" />
        <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface/50"
          data-icon="search">search</span>
      </div>
      <button (click)="toggleMobileSearch()" class="p-2 hover:bg-[#F5F5DC] dark:hover:bg-[#1B3022] rounded-full transition-colors">
        <span class="material-symbols-outlined text-xl" data-icon="close">close</span>
      </button>
    </div>
  }

  <!-- Left Side: Dashboard Title & Toggle -->
  <div class="flex items-center gap-2 md:gap-4">
    <button (click)="layoutService.toggleSidebar()" class="lg:hidden p-2 hover:bg-[#F5F5DC] dark:hover:bg-[#1B3022] rounded-full transition-colors flex items-center justify-center shadow-sm" title="القائمة">
      <span class="material-symbols-outlined text-xl md:text-2xl" data-icon="menu">menu</span>
    </button>
    <div class="flex flex-col">
      <span class="text-[10px] font-black uppercase tracking-widest text-[#061B0E]/40 mb-0.5">النظام الإداري</span>
      <h1 class="text-xl md:text-2xl font-bold text-[#061B0E] dark:text-[#FBFBE2] whitespace-nowrap">لوحة التحكم</h1>
    </div>
  </div>

  <!-- Right Side: Search & User Actions -->
  <div class="flex items-center gap-3 md:gap-6">
    <!-- Desktop Search -->
    <div class="relative group hidden md:block">
      <input
        class="bg-surface-container-low border border-outline-variant/10 rounded-2xl px-12 py-2 text-sm w-48 lg:w-64 focus:ring-4 focus:ring-secondary/5 focus:border-secondary/30 transition-all text-right"
        placeholder="ابحث عن مقالات، كتب..." type="text" />
      <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface/50 group-focus-within:text-secondary transition-colors"
        data-icon="search">search</span>
    </div>

    <div class="flex items-center gap-1 md:gap-4 border-r border-outline-variant/10 pr-4">
      <button (click)="toggleMobileSearch()" class="md:hidden relative p-2 hover:bg-[#F5F5DC] dark:hover:bg-[#1B3022] rounded-full transition-colors" title="بحث">
        <span class="material-symbols-outlined text-xl" data-icon="search">search</span>
      </button>
      
      <a routerLink="/" class="relative p-2 hover:bg-[#F5F5DC] dark:hover:bg-[#1B3022] rounded-full transition-colors group" title="العودة للموقع الرئيسي">
        <span class="material-symbols-outlined text-xl md:text-2xl transition-transform group-hover:scale-110" data-icon="home">home</span>
      </a>

      <button class="relative p-2 hover:bg-[#F5F5DC] dark:hover:bg-[#1B3022] rounded-full transition-colors group">
        <span class="material-symbols-outlined text-xl md:text-2xl transition-transform group-hover:scale-110" data-icon="notifications">notifications</span>
        <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-error rounded-full border-2 border-[#FBFBE2] dark:border-[#061B0E]"></span>
      </button>

      <!-- User Profile -->
      @if (userProfile$ | async; as user) {
        <div class="flex items-center gap-2 md:gap-3 border-r pr-2 md:pr-4 border-outline-variant/20">
          <div class="flex flex-col text-left items-end hidden sm:flex">
            <span class="text-xs font-bold">{{user.firstName}} {{user.lastName}}</span>
            <span class="text-[9px] font-black uppercase text-secondary tracking-tighter">مدير النظام</span>
          </div>
          <img [alt]="user.firstName + ' ' + user.lastName" class="w-9 h-9 rounded-xl object-cover shadow-sm border border-outline-variant/10"
            [src]="user.profilePhoto" />
        </div>
      } @else {
        <div class="flex items-center gap-2 md:gap-3 border-r pr-2 md:pr-4 border-outline-variant/20">
          <div class="w-9 h-9 rounded-xl bg-outline-variant/20 animate-pulse"></div>
          <div class="h-4 w-20 bg-outline-variant/20 animate-pulse rounded hidden sm:block"></div>
        </div>
      }
    </div>
  </div>
</header>
