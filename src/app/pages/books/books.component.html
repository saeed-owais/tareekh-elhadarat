<main class="pt-28 pb-20">
  <div class="container mx-auto px-8">
    <!-- Page Header -->
    <div class="text-center mb-16">
      <h1 class="text-5xl font-headline font-bold text-primary mb-4">إصداراتنا</h1>
      <p class="text-xl text-on-surface-variant font-body max-w-2xl mx-auto">
        مكتبة رقمية تضم مجموعة مختارة من الكتب والدراسات في الفكر والتاريخ والفلسفة.
      </p>
    </div>

    <!-- Books Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-12 max-w-6xl mx-auto">
      @for (book of books; track book.id) {
        <div class="text-center group">
          <div class="bg-surface-container-high aspect-[2/3] mb-6 rounded shadow-lg overflow-hidden relative transform group-hover:-translate-y-2 transition-transform duration-500">
            <img loading="lazy"
                 [alt]="book.title"
                 class="w-full h-full object-cover"
                 [src]="book.coverImage">
            <div class="absolute inset-0 bg-primary/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center backdrop-blur-sm">
              <button class="bg-secondary text-on-secondary px-6 py-3 rounded-full font-label text-sm flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">download</span>
                PDF
              </button>
            </div>
          </div>
          <h3 class="text-xl font-headline font-bold mb-2">{{ book.title }}</h3>
          <p class="text-sm text-on-surface-variant font-label mb-2">{{ book.authorName }}</p>
          <p class="text-sm text-on-surface-variant/70 font-body mb-4 line-clamp-2">{{ book.description }}</p>
          <button class="w-full py-3 border border-outline-variant hover:bg-primary hover:text-on-primary transition-all rounded font-label text-sm">
            تحميل النسخة الرقمية (PDF)
          </button>
        </div>
      }
    </div>
  </div>
</main>
